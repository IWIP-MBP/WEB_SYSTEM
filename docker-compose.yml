services:
  db:
    image: postgres:15
    container_name: hr_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: iwip123
      POSTGRES_DB: hr_system
      TZ: Asia/Tokyo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "tcp_keepalives_idle=60"
      - "-c"
      - "tcp_keepalives_interval=10"
      - "-c"
      - "tcp_keepalives_count=6"
      - "-c"
      - "idle_in_transaction_session_timeout=300000"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d hr_system"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: hr_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy     # 等待数据库健康检查通过
    environment:
      DATABASE_URL: postgresql://admin:iwip123@db:5432/hr_system   # 注意主机名是 db
      SECRET_KEY: iwip-secret-key-change-in-production
      CORS_ORIGINS: "*"
      TZ: Asia/Tokyo
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./backups:/app/backups
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: hr_frontend
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - API_BASE=http://backend:8000/api
      - TZ=Asia/Tokyo
    ports:
      - "8501:8501"
    volumes:
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  nginx:
    image: nginx:alpine
    container_name: hr_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy

  ngrok:
    image: ngrok/ngrok:latest
    container_name: hr_ngrok
    restart: always
    environment:
      - NGROK_AUTHTOKEN=3FG5jhZvaqERYNa24VGcdXEJmkt_7UpFfjpuvWi15TXRAiknW
    command:
      - "http"
      - "nginx:80"
      - "--url=civil-grueling-enigmatic.ngrok-free.dev"
    depends_on:
      - nginx

volumes:
  postgres_data:
