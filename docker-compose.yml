services:
  db:
    image: postgres:15
    container_name: hr_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: iwip123
      POSTGRES_DB: hr_system
      TZ: Asia/Tokyo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d hr_system"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: hr_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy     # 等待数据库健康检查通过
    environment:
      DATABASE_URL: postgresql://admin:iwip123@db:5432/hr_system   # 注意主机名是 db
      SECRET_KEY: iwip-secret-key-change-in-production
      CORS_ORIGINS: "*"
      TZ: Asia/Tokyo
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: hr_frontend
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - API_BASE=http://backend:8000/api
      - TZ=Asia/Tokyo
    ports:
      - "8501:8501"
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  postgres_data:
  uploads_data:
